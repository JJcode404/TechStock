$kind: http-request
name: Change Password
method: POST
order: 5000
url: '{{baseUrl}}/auth/change-password'
description: 'Revokes all sessions on success — you must log in again afterwards.'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "Admin@12345",
      "newPassword": "Admin@67890"
    }
