$kind: http-request
name: Cancel Sale
method: POST
order: 6000
url: '{{baseUrl}}/sales/{{saleId}}/cancel'
description: 'Only COMPLETED sales can be cancelled. Restocks all items and reverses balances/loyalty.'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "reason": "Entered in error"
    }
