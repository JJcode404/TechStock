$kind: http-request
name: List Sales
method: GET
order: 1000
url: '{{baseUrl}}/sales'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
queryParams:
  - key: page
    value: '1'
  - key: pageSize
    value: '25'
  - key: customerId
    value: ''
    disabled: true
  - key: cashierId
    value: ''
    disabled: true
  - key: status
    value: 'COMPLETED'
    disabled: true
  - key: from
    value: ''
    disabled: true
  - key: to
    value: ''
    disabled: true
