$kind: http-request
name: Adjust Loyalty Points
method: POST
order: 6000
url: '{{baseUrl}}/customers/{{customerId}}/loyalty'
description: 'Positive to grant, negative to redeem. Redeeming below zero is rejected.'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "points": 100,
      "reason": "Promo bonus"
    }
