$kind: http-request
name: List Categories
method: GET
order: 1000
url: '{{baseUrl}}/categories'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
queryParams:
  - key: page
    value: '1'
  - key: pageSize
    value: '25'
  - key: search
    value: ''
    disabled: true
  - key: parentId
    value: ''
    disabled: true




