$kind: http-request
name: Update Category
method: PATCH
order: 4000
url: '{{baseUrl}}/categories/{{categoryId}}'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "description": "Laptops, desktops and accessories"
    }
