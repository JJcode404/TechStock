$kind: http-request
name: List Suppliers
method: GET
order: 1000
url: '{{baseUrl}}/suppliers'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
queryParams:
  - key: page
    value: '1'
  - key: pageSize
    value: '25'
  - key: search
    value: ''
    disabled: true
